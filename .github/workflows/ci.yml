name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: cargo nextest
        run: cargo nextest run --workspace --target ${{ matrix.target }}

      - name: cargo build (release)
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: rt-audit (release)
        run: cargo run --release -p rt-audit --target ${{ matrix.target }}

  rt-audit-debug:
    name: RT-audit (debug)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: rt-audit (debug)
        run: cargo run -p rt-audit
